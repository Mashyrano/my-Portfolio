{%load static%}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="{%static 'css/style.css'%}">
    <link rel="stylesheet" href="{%static 'css/bootstrap.min.css'%}">
</head>
<body>
    <div class="container-fluid vh-100 d-flex justify-content-center">
        <div class="row my-3">
            <div class="col">
                <form class="p-4" action="/signup" method="POST">
                    {% csrf_token %}
                    <h2 class="mt-2 mb-5">Sign Up</h2>
                    <div class="mb-3 my-input">
                        <label for="name">Username</label><br>
                        <input type="text" name="name" id="name" placeholder="Username" class="form-control">
                    </div>
                    <div class="mb-3 my-input">
                        <label for="email">Email</label><br>
                        <input type="text" name="email" id="email" placeholder="JohnDoe@tmail.com" class="form-control">
                    </div>
                    <div class="mb-3 my-input">
                        <label for="password">Password</label><br>
                        <input type="password" name="password" id="password" class="form-control">
                    </div>
                    <div class="mb-3 my-input">
                        <label for="confirm">Confirm Password</label><br>
                        <input type="password" name="confirm" id="confirm" class="form-control">
                    </div>                                      
                    <button type="submit" class="btn1 mt-1">Submit</button>
                    <a href="/login">login?</a>
                </form>
            </div>
        </div>        
    </div>
</body>
</html>
